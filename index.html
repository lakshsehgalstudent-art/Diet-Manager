<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nourish — Food Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ─── TOP BAR ─── -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="date-block">
        <span id="dayName" class="day-name"></span>
        <span id="dateStr" class="date-str"></span>
      </div>
      <div class="app-name">nourish</div>
      <div id="liveClock" class="live-clock"></div>
    </div>
  </header>

  <!-- ─── MAIN SCROLL CONTAINER ─── -->
  <main class="scroll-container">

    <!-- ─── BUDGET OVERVIEW CARD ─── -->
    <section class="card overview-card">
      <div class="overview-grid">
        <div class="metric-block">
          <span class="metric-label">Budget</span>
          <span class="metric-value" id="metricBudget">₹0</span>
        </div>
        <div class="metric-block metric-center">
          <span class="metric-label">Spent</span>
          <span class="metric-value spent" id="metricSpent">₹0</span>
          <div class="spend-bar-wrap">
            <div class="spend-bar" id="spendBar"></div>
          </div>
        </div>
        <div class="metric-block">
          <span class="metric-label">Fund</span>
          <span class="metric-value fund" id="metricFund">₹0</span>
        </div>
      </div>
    </section>

    <!-- ─── MEALS TIMELINE ─── -->
    <section class="section-title-row">
      <h2 class="section-title">Today's Meals</h2>
      <span class="section-sub" id="todayLabel"></span>
    </section>

    <div id="mealsTimeline" class="meals-list"></div>

    <!-- ─── PREP CARD ─── -->
    <section class="card prep-card" id="prepCard">
      <div class="prep-lock" id="prepLock">
        <div class="prep-lock-icon">🔒</div>
        <p class="prep-lock-text">Prep list unlocks at <strong>3:00 PM</strong></p>
      </div>
      <div class="prep-content hidden" id="prepContent">
        <div class="prep-header">
          <span class="prep-title">Tomorrow's Requirements</span>
          <span class="prep-badge">Ready</span>
        </div>
        <ul class="ingredient-list" id="prepIngredients"></ul>
      </div>
    </section>

    <!-- ─── EXTRA EXPENSE BUTTON ─── -->
    <div class="add-expense-wrap">
      <button class="add-btn" id="addExpenseBtn">
        <span class="add-btn-icon">+</span>
        <span>Add Expense</span>
      </button>
    </div>

    <!-- ─── EXPENSE LOG ─── -->
    <div id="expenseLog" class="expense-log"></div>

    <div style="height: 80px;"></div>
  </main>

  <!-- ─── ADD EXPENSE MODAL ─── -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="expenseModal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Add Expense</h3>
      <div class="modal-field">
        <label class="modal-label">Amount (₹)</label>
        <input type="number" id="expenseAmount" class="modal-input" placeholder="0" inputmode="numeric" />
      </div>
      <div class="modal-field">
        <label class="modal-label">Label <span class="optional">(optional)</span></label>
        <input type="text" id="expenseName" class="modal-input" placeholder="e.g. Evening chai" />
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-confirm" id="modalConfirm">Add</button>
      </div>
    </div>
  </div>

  <!-- ─── MEAL DETAIL DRAWER ─── -->
  <div class="modal-overlay hidden" id="drawerOverlay">
    <div class="drawer" id="mealDrawer">
      <div class="modal-handle"></div>
      <div class="drawer-meal-tag" id="drawerTag"></div>
      <h3 class="drawer-title" id="drawerTitle"></h3>
      <div class="drawer-meta" id="drawerMeta"></div>
      <div class="drawer-section">
        <span class="drawer-section-label">Ingredients</span>
        <ul class="drawer-ingredients" id="drawerIngredients"></ul>
      </div>
      <div class="drawer-section" id="drawerNotesSection">
        <span class="drawer-section-label">Notes</span>
        <p class="drawer-notes" id="drawerNotes"></p>
      </div>
      <button class="drawer-close" id="drawerClose">Done</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
